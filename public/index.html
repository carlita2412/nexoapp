<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="manifest" href="/manifest.webmanifest"><link rel="stylesheet" href="/app.css"><title>Nexo Campo</title></head><body><main id="app" class="app" x-data="nexoApp()" x-init="iniciar()"><div class="row"><strong>Nexo Campo</strong><span class="pill" :class="online?'confirmada':'superada'" x-text="online?'Con señal':'Modo avión'"></span></div><section class="card" x-show="!token"><h1>Ingreso</h1><input class="input" x-model="login.username" placeholder="Usuario"><input class="input" x-model="login.password" type="password" placeholder="Clave"><input class="input" x-model="apiBase" placeholder="API base"><button class="btn primary" @click="hacerLogin()">Entrar</button><p class="danger" x-text="error"></p></section><section x-show="token"><section class="card row"><div><strong>Sincronización</strong><div class="muted" x-text="syncMensaje"></div></div><button class="btn primary" @click="sincronizar()">Sincronizar</button></section><section id="necesidades" class="card"><h2>Necesidades</h2><button class="btn secondary" @click="agregarDemo('necesidad')">Nueva necesidad offline</button><template x-for="n in necesidades" :key="n.id"><article class="card"><div class="row"><strong x-text="n.item_nombre||n.item||'Necesidad'"></strong><span class="pill" :class="estadoClase(n.estado_claim||n.estado_local)" x-text="n.estado_claim||n.estado_local||n.estado"></span></div><button class="btn primary" @click="prepararClaim(n)">Claim</button></article></template></section><section id="donaciones" class="card"><h2>Donaciones</h2><button class="btn secondary" @click="agregarDemo('donacion')">Nueva donación offline</button></section><section id="matching" class="card"><h2>Matching</h2><button class="btn primary" @click="verMatching()">Ver candidatos</button></section><section id="envios" class="card"><h2>Envíos y fotos</h2><input class="input" type="file" accept="image/*"><button class="btn primary" @click="crearEnvio()">Guardar envío offline</button></section><section id="cola" class="card"><h2>Cola pendiente <span class="pill" x-text="outbox.length"></span></h2><template x-for="e in outbox" :key="e.idempotency_key"><article class="card"><strong x-text="e.entity"></strong><p class="muted" x-text="e.estado"></p></article></template></section></section></main><nav class="tabs"><a class="tab" href="#necesidades">Neces.</a><a class="tab" href="#donaciones">Donac.</a><a class="tab" href="#matching">Match</a><a class="tab" href="#envios">Envios</a><a class="tab" href="#cola">Cola</a></nav><script type="module" src="/app.js"></script></body></html>
